<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — StockAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              outfit: ['Outfit', 'sans-serif'],
            },
            colors: {
              bg: '#0A0A0A',
              bg2: '#121212',
              bg3: '#27272A',
              bordercol: '#3F3F46',
              textcol: '#F8FAFC',
              text2col: '#A1A1AA',
              text3col: '#71717A',
              brand: '#8B5CF6',
              brand2: '#38BDF8',
            },
            boxShadow: {
              'soft': '0 10px 40px -10px rgba(0,0,0,0.7)',
              'glow': '0 0 20px rgba(139, 92, 246, 0.35)',
            }
          }
        }
      }
    </script>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px) scale(1); }
        50% { transform: translateY(-20px) scale(1.05); }
      }
      .blob {
        position: absolute; border-radius: 50%; filter: blur(80px);
        z-index: 0; opacity: 0.15; animation: float 10s ease-in-out infinite;
      }
      .interactive-btn {
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s;
      }
      .interactive-btn:active { transform: scale(0.97); }
      .interactive-btn:hover { box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4); transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gradient-to-br from-bg via-[#0F0F14] to-bg2 text-textcol font-sans min-h-screen flex items-center justify-center relative overflow-hidden selection:bg-brand selection:text-white py-10">
    <div class="blob w-[30vh] h-[30vh] bg-[#0EA5E9]/20 top-[-10%] left-[-5%] delay-0"></div>
    <div class="blob w-[40vh] h-[40vh] bg-[#8B5CF6]/20 bottom-[-10%] right-[-10%]" style="animation-delay: -5s"></div>

    <div class="w-full max-w-md px-6 relative z-10">
        

        <div class="bg-bg2/90 backdrop-blur-xl border border-bordercol rounded-3xl p-8 shadow-soft transition-all">
            <div class="flex items-center gap-3 mb-8 justify-center">
                <div class="w-12 h-12 bg-brand/10 text-brand rounded-2xl flex items-center justify-center text-2xl shadow-sm border border-brand/20">📈</div>
                <div class="text-3xl font-outfit font-extrabold tracking-tight">Stock<span class="bg-gradient-to-r from-brand2 to-brand bg-clip-text text-transparent">AI</span></div>
            </div>
            
            <h1 class="text-2xl font-outfit font-bold text-center mb-2">Create an Account</h1>
            <p class="text-text2col text-center text-sm mb-8">Join the next generation of algorithmic stock trading.</p>
            
            {% if error %}
            <div class="mb-4 bg-red-500/10 text-red-400 p-3 rounded-xl text-center font-medium border border-red-500/20 text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form action="/signup/" method="POST" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label class="block text-xs font-bold text-text2col uppercase tracking-wider mb-2" for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="w-full bg-bg border border-bordercol focus:border-brand rounded-xl px-4 py-3 text-sm outline-none transition-all placeholder-text2col/50 focus:shadow-[0_0_0_3px_rgba(56,189,248,0.15)]" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-xs font-bold text-text2col uppercase tracking-wider mb-2" for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="w-full bg-bg border border-bordercol focus:border-brand rounded-xl px-4 py-3 text-sm outline-none transition-all placeholder-text2col/50 focus:shadow-[0_0_0_3px_rgba(56,189,248,0.15)]" placeholder="you@example.com" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-text2col uppercase tracking-wider mb-2" for="password">Password</label>
                    <input type="password" id="password" name="password" class="w-full bg-bg border border-bordercol focus:border-brand rounded-xl px-4 py-3 text-sm outline-none transition-all placeholder-text2col/50 focus:shadow-[0_0_0_3px_rgba(56,189,248,0.15)]" placeholder="••••••••" required>
                </div>
                <button class="w-full bg-gradient-to-r from-brand to-brand2 text-white font-bold py-3 px-4 rounded-xl shadow-glow interactive-btn hover:opacity-90" type="submit">Create Account</button>
            </form>
            
            <div class="mt-8 text-center text-sm text-text2col font-medium">
                Already have an account? <a href="/login/" class="text-brand hover:underline font-bold">Sign In</a>
            </div>
        </div>
    </div>
</body>
</html>
